name: Run API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'

    - name: Restore NuGet
      run: dotnet restore Restful.Booker.Api/Restful.Booker.Api.slnx

    - name: Build
      run: dotnet build Restful.Booker.Api/Restful.Booker.Api.slnx --no-restore -p:WarningLevel=0

    - name: Run tests
      run: dotnet test Restful.Booker.Api/Restful.Booker.Api.slnx --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" -p:WarningLevel=0
      env:
        ApiSettings__Username: ${{ secrets.AUTH_USERNAME }}
        ApiSettings__Password: ${{ secrets.AUTH_PASSWORD }}

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/test-results.trx'

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: '**/test-results.trx'
        reporter: dotnet-trx
        fail-on-empty: 'false'